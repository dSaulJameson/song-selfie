name: Deploy to HostHatch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: song-selfie-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-24.04
    environment: production
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify application
        run: |
          npm run typecheck
          npm run build

      - name: Package deployment source
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=.next \
            --exclude='.env*' \
            --exclude=env.local \
            --exclude=.vercel \
            --exclude=.clerk \
            --exclude=PersonalN8N \
            --exclude='New Site UI' \
            --exclude='*ed25519*' \
            -czf "/tmp/song-selfie-${GITHUB_SHA}.tgz" .

      - name: Configure pinned SSH access
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.HOSTHATCH_SSH_KEY_B64 }}
          SSH_KNOWN_HOSTS: ${{ vars.HOSTHATCH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 --decode > ~/.ssh/hosthatch_deploy
          chmod 600 ~/.ssh/hosthatch_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload release
        env:
          HOSTHATCH_HOST: ${{ vars.HOSTHATCH_HOST }}
        run: |
          set -euo pipefail
          scp \
            -i ~/.ssh/hosthatch_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "/tmp/song-selfie-${GITHUB_SHA}.tgz" \
            "deploy@${HOSTHATCH_HOST}:/tmp/song-selfie-${GITHUB_SHA}.tgz"

      - name: Activate release
        env:
          HOSTHATCH_HOST: ${{ vars.HOSTHATCH_HOST }}
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/hosthatch_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "deploy@${HOSTHATCH_HOST}" \
            "sudo /usr/local/sbin/deploy-song-selfie /tmp/song-selfie-${GITHUB_SHA}.tgz ${GITHUB_SHA}"
